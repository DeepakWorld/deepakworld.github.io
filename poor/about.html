<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Deepak IT & Web Services</title>
  <style>
    :root {
      --primary-blue: #004085;
      --accent-gold: #ffd700;
      --dark-bg: #1a1a1a;
      --text-light: #f8f9fa;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f7f6;
      color: #333;
    }

    /* Header Styles */
    header {
      background-color: var(--primary-blue);
      color: white;
      padding: 2rem 1rem;
      text-align: center;
      border-bottom: 5px solid var(--accent-gold);
    }

    .video-info h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: bold;
    }

    /* Gallery Grid */
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      background: #fff;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
    }

    .ad-caption {
      padding: 15px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--primary-blue);
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      padding-top: 60px;
      left: 0; top: 0;
      width: 100%; height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.9);
    }
    .modal-content {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 90%;
    }
    .close {
      position: absolute;
      top: 20px; right: 35px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Video Gallery */
    .video-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .video-container {
      position: relative;
      width: 100%;
      padding-top: 100%;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .video-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }

    /* Contact Section */
    .contact-footer {
      background: var(--dark-bg);
      color: white;
      text-align: center;
      padding: 3rem 1rem;
      margin-top: 50px;
    }
    .contact-footer a {
      color: var(--accent-gold);
      text-decoration: none;
    }
    .ai-links {
      margin: 15px 0;
    }
    .ai-links a {
      display: inline-block;
      margin: 0 10px;
      padding: 8px 16px;
      background: var(--accent-gold);
      color: var(--dark-bg);
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    .ai-links a:hover {
      background: #B22222;
      color: #FFFFFF;
    }
    .footer-note {
      margin-top: 15px;
      font-style: italic;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<header>
  <div class="video-info">
    <h1>Poor Vs Rich</h1>
  </div>
</header>

<!-- Video Gallery -->
<div class="video-gallery">
  <div class="video-container">
    <iframe width="315" height="576" src="https://www.youtube.com/embed/3i3Flm0HZvo" title="poor" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </div>
</div>

<!-- Footer -->
<footer class="contact-footer">
  <h2>Contact AI for Equal Rights Solutions</h2>
  <p>For guidance on how governments can ensure equal rights for all people, reach out to AI companions like Copilot.</p>
  <div class="ai-links">
    <a href="https://copilot.microsoft.com" target="_blank">Copilot</a>
    <a href="https://gemini.google.com" target="_blank">Gemini</a>
    <a href="https://openai.com/chatgpt" target="_blank">ChatGPT</a>
  </div>
  <p class="footer-note">Awareness is Freedom — Learn, Unite, Reclaim.</p>
</footer>
</body>
</html>
