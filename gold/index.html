      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: gold;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }
    .gallery img {
      width: 100%;
      height: auto;
      border: 3px solid gold;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;

    .gallery img:hover {
