<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Correction Tool</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; }
    canvas { border: 1px solid #ccc; margin-top: 10px; }
    img { max-width: 100%; height: auto; object-fit: contain; }
    #output { margin-top: 20px; }
    .controls { margin-top: 15px; }
    .controls label { margin-right: 10px; }
  </style>
</head>
<body>
  <h2>Image Correction Demo</h2>
  <input type="file" id="upload" accept="image/*">
  <canvas id="myCanvas" width="500" height="400"></canvas>
  <br>
  <button onclick="applySharpen()">Sharpen</button>
  <button onclick="removeBlackSpots()">Remove Black Spots</button>
  <br><br>

  <div class="controls">
    <label>Brightness:
      <input type="range" id="brightness" min="-100" max="100" value="0">
    </label>
    <label>Contrast:
      <input type="range" id="contrast" min="-100" max="100" value="0">
    </label>
    <button onclick="applyAdjustments()">Apply Adjustments</button>
  </div>

  <br>
  <select id="format">
    <option value="png">PNG</option>
    <option value="jpeg">JPG</option>
  </select>
  <button onclick="downloadImage()">Download</button>

  <div id="output"></div>

  <script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");
    let img = new Image();

    // Load uploaded image
    document.getElementById("upload").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = evt => {
        img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Sharpen filter
    function applySharpen() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        data[i] = Math.min(255, data[i] * 1.1);
        data[i+1] = Math.min(255, data[i+1] * 1.1);
        data[i+2] = Math.min(255, data[i+2] * 1.1);
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // Remove black spots
    function removeBlackSpots() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        if (data[i] < 20 && data[i+1] < 20 && data[i+2] < 20) {
          data[i] = 255; data[i+1] = 255; data[i+2] = 255;
        }
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // Brightness & Contrast adjustments
    function applyAdjustments() {
      const brightness = parseInt(document.getElementById("brightness").value);
      const contrast = parseInt(document.getElementById("contrast").value);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));

      for (let i = 0; i < data.length; i += 4) {
        data[i] = factor * (data[i] - 128) + 128 + brightness;
        data[i+1] = factor * (data[i+1] - 128) + 128 + brightness;
        data[i+2] = factor * (data[i+2] - 128) + 128 + brightness;
      }

      ctx.putImageData(imageData, 0, 0);
    }

    // Download corrected image
    function downloadImage() {
      const format = document.getElementById("format").value;
      const mime = format === "jpeg" ? "image/jpeg" : "image/png";
      const link = document.createElement("a");
      link.download = "corrected." + format;
      link.href = canvas.toDataURL(mime);
      link.click();
    }
  </script>
</body>
</html>
