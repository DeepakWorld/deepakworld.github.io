
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Correction Tool</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; }
    canvas { border: 1px solid #ccc; margin-top: 10px; }
    img { max-width: 100%; height: auto; object-fit: contain; }
    #output { margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Image Correction Demo</h2>
  <input type="file" id="upload" accept="image/*">
  <canvas id="myCanvas" width="500" height="400"></canvas>
  <br>
  <button onclick="applySharpen()">Sharpen</button>
  <button onclick="removeBlackSpots()">Remove Black Spots</button>
  <button onclick="exportImage()">Export</button>
  <div id="output"></div>

  <script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");
    let img = new Image();

    // Load uploaded image
    document.getElementById("upload").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = evt => {
        img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Sharpen filter (basic convolution)
    function applySharpen() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        data[i] = Math.min(255, data[i] * 1.1);     // R
        data[i+1] = Math.min(255, data[i+1] * 1.1); // G
        data[i+2] = Math.min(255, data[i+2] * 1.1); // B
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // Remove black spots (replace very dark pixels with white)
    function removeBlackSpots() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        if (data[i] < 20 && data[i+1] < 20 && data[i+2] < 20) {
          data[i] = 255; data[i+1] = 255; data[i+2] = 255;
        }
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // Export corrected image
    function exportImage() {
      const corrected = canvas.toDataURL("image/png");
      document.getElementById("output").innerHTML =
        `<h3>Corrected Image:</h3><img src="${corrected}">`;
    }
  </script>
</body>
</html>
