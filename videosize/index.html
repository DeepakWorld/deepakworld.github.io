<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Compression Demo</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background:#f4f4f9; padding:20px; }
    video, canvas { margin-top:10px; max-width:100%; border:1px solid #ccc; }
    .controls { margin-top:15px; }
    .controls button, .controls select { margin:5px; padding:8px 12px; cursor:pointer; }
    .status { margin-top:10px; font-weight:bold; color:#555; }
  </style>
</head>
<body>

  <h2>Video Compression Demo</h2>
  <input type="file" id="upload" accept="video/*">
  <div>
    <video id="preview" controls></video>
    <canvas id="offCanvas" style="display:none;"></canvas>
  </div>
  <div class="status" id="status">Upload a video to begin.</div>

  <div class="controls">
    <label for="resolution">Resolution:</label>
    <select id="resolution">
      <option value="original">Original</option>
      <option value="720p">HD (1280x720)</option>
      <option value="480p">SD (854x480)</option>
    </select>

    <label for="bitrate">Bitrate:</label>
    <select id="bitrate">
      <option value="1000000">1 Mbps (smallest)</option>
      <option value="2000000" selected>2 Mbps (balanced)</option>
      <option value="4000000">4 Mbps (higher quality)</option>
    </select>

    <button onclick="compressVideo()">Compress & Download</button>
  </div>

  <script>
    const upload = document.getElementById("upload");
    const preview = document.getElementById("preview");
    const offCanvas = document.getElementById("offCanvas");
    const statusText = document.getElementById("status");

    let videoFile;

    upload.addEventListener("change", e => {
      videoFile = e.target.files[0];
      if (!videoFile) return;
      const url = URL.createObjectURL(videoFile);
      preview.src = url;
      statusText.innerText = `Loaded: ${videoFile.name} (${(videoFile.size/1024/1024).toFixed(1)} MB)`;
    });

    function compressVideo() {
      if (!videoFile) {
        statusText.innerText = "Please upload a video first.";
        return;
      }

      const res = document.getElementById("resolution").value;
      const bitrate = parseInt(document.getElementById("bitrate").value);

      // Set target resolution
      let targetWidth = preview.videoWidth;
      let targetHeight = preview.videoHeight;
      if (res === "720p") { targetWidth = 1280; targetHeight = 720; }
      if (res === "480p") { targetWidth = 854; targetHeight = 480; }

      offCanvas.width = targetWidth;
      offCanvas.height = targetHeight;
      const offCtx = offCanvas.getContext("2d");

      // Draw frames proportionally
      preview.play();
      function drawFrame() {
        offCtx.drawImage(preview, 0, 0, targetWidth, targetHeight);
        requestAnimationFrame(drawFrame);
      }
      drawFrame();

      // Capture compressed stream
      const stream = offCanvas.captureStream(30);
      const recorder = new MediaRecorder(stream, {
        mimeType: "video/webm;codecs=vp9",
        videoBitsPerSecond: bitrate
      });

      const chunks = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/webm" });
        const link = document.createElement("a");
        link.download = "compressed_video.webm";
        link.href = URL.createObjectURL(blob);
        link.click();
        statusText.innerText = `Compression complete. New size: ${(blob.size/1024/1024).toFixed(1)} MB`;
      };

      recorder.start();
      preview.onended = () => recorder.stop();
      statusText.innerText = "Compressing... please wait until video ends.";
    }
  </script>
</body>
</html>
