<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhonePe Orders Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #5f259f; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
    .status-success { color: green; font-weight: bold; }
    .status-pending { color: orange; font-weight: bold; }
    .status-failed { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>📊 PhonePe Orders Dashboard</h1>
  <table>
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Amount (₹)</th>
        <th>Status</th>
        <th>Created At</th>
      </tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>

  <script>
    async function loadOrders() {
      try {
        const response = await fetch('https://phonepe-kohl.vercel.app/api/orders');
        const orders = await response.json();

        const table = document.getElementById('ordersTable');
        table.innerHTML = "";

        orders.forEach(order => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${order.orderId}</td>
            <td>${(order.amount / 100).toFixed(2)}</td>
            <td class="status-${order.state.toLowerCase()}">${order.state}</td>
            <td>${new Date(order.createdAt).toLocaleString()}</td>
          `;
          table.appendChild(row);
        });
      } catch (err) {
        console.error("Error loading orders:", err);
      }
    }

    loadOrders();
  </script>
</body>
</html>
